<section class="hero section-shell" data-reveal>
  <div class="hero-copy">
    <p class="kicker">{{hero.eyebrow}}</p>
    <h1>{{hero.title}}</h1>
    <p class="lede">{{hero.body}}</p>
    <div class="hero-actions">
      <a class="button button-primary" href="{{hero.primaryCta.href}}">{{hero.primaryCta.label}}</a>
      <a class="button button-secondary" href="{{hero.secondaryCta.href}}">{{hero.secondaryCta.label}}</a>
    </div>
  </div>
  <div class="terminal-stack" aria-label="Nornir command examples">
    {{terminals}}
  </div>
</section>
