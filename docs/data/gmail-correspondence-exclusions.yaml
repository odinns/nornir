version: 1
purpose: >
  Seed exclusions for header-level correspondence analysis of Gmail imports.
  This is for biographical reading and "human mail" slicing, not for import-time
  filtering. It is intentionally blunt.

notes:
  - Start by excluding these buckets before trying to interpret a year socially.
  - Keep newsletters and curated mailing lists out of the "human correspondence" pile.
  - Allowlisted humans and admin contacts should win over broad exclusion heuristics.
  - Seeded from observed mail patterns in 2002-2006.
  - Person-role clarifications below are biography context, not exclusion rules.

