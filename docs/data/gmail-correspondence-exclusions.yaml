year_notes:
  "2002":
    - Still patchy and swampy. Human mail exists, but fossils dominate.
  "2003":
    - Transition year. More structure, still lots of list traffic and fake-human spam.
  "2004":
    - Mostly organized feeds and newsletters; little direct personal signal.
  "2005":
    - Family/admin and property signal becomes much clearer.
  "2006":
    - Dating, pickup, and affiliate swamp blooms hard; requires aggressive exclusion.
